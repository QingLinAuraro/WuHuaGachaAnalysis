# 物华弥新 - UI 按钮坐标配置示例
# ==========================================
# 使用 tools/coordinate_viewer.py 标记点位后导出此文件
# 程序启动时会自动读取此配置来定位按钮
#
# 当前为 1280x720 分辨率的预设坐标，请根据实际截图调整

coords:
  # 主界面 → "招集"按钮
  gacha_button: {x: 1100, y: 620}
  # 招集主页 → "召集记录"按钮
  record_button: {x: 640, y: 680}
  # 召集记录列表 → 翻页滑动起点
  record_list_start: {x: 640, y: 560}
  # 召集记录列表 → 翻页滑动终点
  record_list_end: {x: 640, y: 160}
  # 返回按钮
  back_button: {x: 60, y: 40}
  # 确认/关闭按钮
  confirm_button: {x: 640, y: 400}
  # "下一页"按钮
  next_page_button: {x: 1180, y: 640}
