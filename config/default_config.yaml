  record_height_min: 45
  scan_page_delay: 2.0
game:
  package_name: com.cipaishe.wuhua.bilibili
gui:
  last_account_id: 3
  theme: dark
  window_height: 600
  window_width: 900
ocr:
  engine: paddleocr
  lang: ch
  use_gpu: false
